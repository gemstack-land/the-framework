packages:
  - packages/*

# pnpm 11 prompts before purging node_modules on a store-version change;
# disable so non-TTY installs (CI, scripts) don't abort.
confirmModulesPurge: false

# pnpm 11 requires native build scripts to be explicitly approved.
allowBuilds:
  esbuild: true
  better-sqlite3: true
  '@google/genai': false
  protobufjs: false

onlyBuiltDependencies:
  - esbuild
  - better-sqlite3
